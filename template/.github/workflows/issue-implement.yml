name: Issue Implement

on:
  issues:
    types: [labeled]

jobs:
  dispatch-cursor-agent:
    if: github.event.label.name == 'ready'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CURSOR_API_KEY secret
        run: |
          if [ -z "${{ secrets.CURSOR_API_KEY }}" ]; then
            echo "::error::CURSOR_API_KEY secret is not configured. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Verify guards and mark in progress
        id: guards
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels -q '[.labels[].name] | join(",")')

          if ! echo "$LABELS" | grep -q 'spec-added'; then
            echo "::error::Issue must have the spec-added label before ready. Apply needs-spec first and wait for the spec comment."
            exit 1
          fi

          if echo "$LABELS" | grep -qE 'agent-working|pr-opened'; then
            echo "::notice::Issue already dispatched or completed. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh label create needs-spec --description "Request AI acceptance criteria" --color "C5DEF5" 2>/dev/null || true
          gh label create spec-added --description "AI-generated acceptance criteria posted" --color "0E8A16" 2>/dev/null || true
          gh label create ready --description "Trigger Cursor cloud agent implementation" --color "FBCA04" 2>/dev/null || true
          gh label create agent-working --description "Cursor cloud agent implementing" --color "FBBA04" 2>/dev/null || true
          gh label create pr-opened --description "Implementation PR opened" --color "1D76DB" 2>/dev/null || true
          gh label create agent-failed --description "Cloud agent failed to implement" --color "D93F0B" 2>/dev/null || true

          gh issue edit "$ISSUE_NUMBER" --add-label agent-working --remove-label ready

      - name: Setup Node
        if: steps.guards.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.guards.outputs.skip != 'true'
        run: npm ci

      - name: Dispatch Cursor cloud agent
        if: steps.guards.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: node scripts/dispatch-cursor-agent.mjs

      - name: Recover issue labels on dispatch failure
        if: failure() && steps.guards.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label agent-working \
            --add-label agent-failed \
            --add-label ready 2>/dev/null || true
          gh issue comment "$ISSUE_NUMBER" --body "Cursor cloud agent dispatch failed. Check the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) and re-add \`ready\` after fixing."
