name: Issue Auto-Spec

on:
  issues:
    types: [labeled]

jobs:
  generate-spec:
    if: github.event.label.name == 'needs-spec'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check OpenAI secret
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::OPENAI_API_KEY secret is not configured. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Generate and post spec comment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q .title)
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)

          CONTEXT=$(cat .github/ai-spec-context.md)

          USER_PROMPT=$(cat <<PROMPT_EOF
          Issue title: ${ISSUE_TITLE}

          Issue body:
          ${ISSUE_BODY:-(no body)}

          Generate a GitHub comment with Acceptance Criteria, Potential Fix Directions, and Notes from Issue / Images for this issue. Follow the output format and rules in your system context exactly.
          PROMPT_EOF
          )

          PAYLOAD=$(jq -n \
            --arg model "gpt-4o-mini" \
            --arg system "$CONTEXT" \
            --arg user "$USER_PROMPT" \
            '{
              model: $model,
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $user}
              ],
              temperature: 0.3
            }')

          RESPONSE=$(curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$ERROR" ]; then
            echo "::error::OpenAI API error: $ERROR"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$COMMENT" ]; then
            echo "::error::Empty response from OpenAI"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          printf '%s\n' "$COMMENT" > /tmp/spec-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/spec-comment.md

          gh label create spec-added --description "AI-generated acceptance criteria posted" --color "0E8A16" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --remove-label "needs-spec" --add-label "spec-added"
